{% extends "theme/base.html" %}

{% block header %}{{ title }}{% endblock %}

{% block content %}
<div class="space-y-3 text-black">

    <!-- Top actions -->
    <div class="flex justify-between items-center">
        <a href="{% url add_url %}"
           class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm">
            + Add
        </a>

        {% if days is not None %}
        <form method="get" class="flex items-center gap-2">
            <input type="number" name="days" value="{{ days }}"
                   class="border rounded px-2 py-1 w-20 text-sm">
            <button class="text-sm bg-gray-200 px-2 py-1 rounded">Go</button>
        </form>
        {% endif %}
    </div>

    <!-- List -->
    <div class="divide-y bg-white rounded-lg shadow">
        {% for obj in objects %}
        <div class="flex justify-between items-center p-3">
            <div class="text-sm">
                {{ obj }}
            </div>
            <a href="{% url delete_url obj.id %}"
               class="text-red-600 text-sm">
                Delete
            </a>
        </div>
        {% empty %}
        <div class="p-4 text-gray-500 text-sm text-center">
            No records found
        </div>
        {% endfor %}
    </div>

</div>
{% endblock %}
