{% extends "theme/base.html" %}
{% load static %}

{% block header %}{{ title }}{% endblock %}

{% block content %}
<form method="post" class="pb-24 space-y-4 text">
    {% csrf_token %}

    {% for field in form %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                {{ field.label }}
            </label>
            {{ field }}
            {% if field.errors %}
                <p class="text-red-500 text-sm mt-1">{{ field.errors|striptags }}</p>
            {% endif %}
        </div>
    {% endfor %}

    <!-- Fixed submit -->
    <div class="fixed bottom-0 left-0 right-0 bg-white p-4 border-t">
        <button type="submit"
            class="w-full bg-green-600 text-white py-3 rounded-lg text-lg font-semibold">
            Save
        </button>
    </div>
</form>
{% endblock %}
